name: Build Flutter Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Create Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --org com.chaleshino
          fi

      - name: Harden Android metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          text = text.replace('android:label="chaleshino"', 'android:label="چالشینو"')
          text = text.replace('android:label="Chaleshino"', 'android:label="چالشینو"')
          manifest.write_text(text, encoding='utf-8')
          PY

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Build AAB
        run: flutter build appbundle --release --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chaleshino-flutter-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: chaleshino-flutter-aab
          path: build/app/outputs/bundle/release/app-release.aab

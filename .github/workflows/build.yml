name: Build Flutter Android From ZIP

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project ZIP
        run: |
          echo "Searching for ZIP file..."

          ZIP_FILE=$(find . -maxdepth 4 -type f -name "*.zip" ! -path "./.git/*" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository."
            echo "Repo files:"
            find . -maxdepth 3 -type f
            exit 1
          fi

          echo "Found ZIP: $ZIP_FILE"

          rm -rf extracted_project
          mkdir extracted_project

          unzip -q "$ZIP_FILE" -d extracted_project

          echo "ZIP extracted."

      - name: Find Flutter project
        run: |
          PROJECT_DIR=$(find extracted_project -maxdepth 6 -name pubspec.yaml -not -path "*/.pub-cache/*" | head -n 1 | xargs dirname)

          if [ -z "$PROJECT_DIR" ]; then
            echo "pubspec.yaml not found inside extracted ZIP."
            echo "Extracted files:"
            find extracted_project -maxdepth 5 -type f
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Flutter project found at: $PROJECT_DIR"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter config
        run: |
          flutter config --no-analytics
          flutter config --no-cli-animations

      - name: Fix Flutter project name
        run: |
          cd "$PROJECT_DIR"

          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path("pubspec.yaml")
          text = pubspec.read_text(encoding="utf-8")

          lines = text.splitlines()
          fixed = []
          changed = False

          for line in lines:
              if line.startswith("name:"):
                  fixed.append("name: chaleshino")
                  changed = True
              else:
                  fixed.append(line)

          if not changed:
              fixed.insert(0, "name: chaleshino")

          pubspec.write_text("\n".join(fixed) + "\n", encoding="utf-8")
          PY

      - name: Flutter pub get
        run: |
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Create Android platform if missing
        run: |
          cd "$PROJECT_DIR"

          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name chaleshino --org mk.kadkhodai
          fi

      - name: Harden Android package and label
        run: |
          cd "$PROJECT_DIR"

          python3 - <<'PY'
          from pathlib import Path
          import re

          package_name = "mk.kadkhodai.chaleshino"

          gradle_paths = [
              Path("android/app/build.gradle"),
              Path("android/app/build.gradle.kts"),
          ]

          for p in gradle_paths:
              if not p.exists():
                  continue

              text = p.read_text(encoding="utf-8")

              text = re.sub(
                  r'applicationId\s+[\'"][^\'"]+[\'"]',
                  f'applicationId "{package_name}"',
                  text
              )

              text = re.sub(
                  r'namespace\s+[\'"][^\'"]+[\'"]',
                  f'namespace "{package_name}"',
                  text
              )

              text = re.sub(
                  r'applicationId\s*=\s*[\'"][^\'"]+[\'"]',
                  f'applicationId = "{package_name}"',
                  text
              )

              text = re.sub(
                  r'namespace\s*=\s*[\'"][^\'"]+[\'"]',
                  f'namespace = "{package_name}"',
                  text
              )

              p.write_text(text, encoding="utf-8")

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")
              text = re.sub(r'android:label="[^"]*"', 'android:label="چالشینو"', text)
              manifest.write_text(text, encoding="utf-8")
          PY

      - name: Analyze
        run: |
          cd "$PROJECT_DIR"
          flutter analyze --no-fatal-infos

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Build AAB
        run: |
          cd "$PROJECT_DIR"
          flutter build appbundle --release --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chaleshino-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: chaleshino-aab
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/bundle/release/app-release.aab
